AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Pronunciation Trainer - Serverless Speech Evaluation API

Globals:
    Function:
        Timeout: 300
        MemorySize: 2048
        Environment:
            Variables:
                USE_API_ASR: true

Parameters:
    SageMakerEndpointName:
        Type: String
        Default: 'whisper-endpoint-gpu'
        Description: Name of the deployed SageMaker Whisper endpoint

    AwsRegion:
        Type: String
        Default: 'eu-central-1'
        Description: AWS region where the SageMaker endpoint is deployed

Resources:
    # API Gateway
    PronunciationTrainerApi:
        Type: AWS::Serverless::Api
        Properties:
            StageName: prod
            Cors:
                AllowMethods: "'GET,POST,OPTIONS'"
                AllowHeaders: "'*'"
                AllowOrigin: "'*'"
            GatewayResponses:
                DEFAULT_4XX:
                    ResponseParameters:
                        Headers:
                            Access-Control-Allow-Origin: "'*'"
                            Access-Control-Allow-Headers: "'*'"
                DEFAULT_5XX:
                    ResponseParameters:
                        Headers:
                            Access-Control-Allow-Origin: "'*'"
                            Access-Control-Allow-Headers: "'*'"

    # Main Lambda Function - Speech to Score
    SpeechToScoreFunction:
        Type: AWS::Serverless::Function
        Properties:
            PackageType: Image
            ImageUri: .
            AutoPublishAlias: live
            ProvisionedConcurrencyConfig:
                ProvisionedConcurrentExecutions: 1
            Description: Evaluates pronunciation accuracy from recorded audio using AWS SageMaker Whisper
            Environment:
                Variables:
                    USE_API_ASR: true
                    SAGEMAKER_ENDPOINT_NAME: !Ref SageMakerEndpointName
                    HF_HOME: /tmp
                    TRANSFORMERS_CACHE: /tmp
                    HUGGINGFACE_HUB_CACHE: /tmp
                    MPLCONFIGDIR: /tmp
            Policies:
                - Statement:
                      - Effect: Allow
                        Action:
                            - sagemaker:InvokeEndpoint
                        Resource: !Sub 'arn:aws:sagemaker:${AwsRegion}:${AWS::AccountId}:endpoint/${SageMakerEndpointName}'
            Events:
                ApiEvent:
                    Type: Api
                    Properties:
                        RestApiId: !Ref PronunciationTrainerApi
                        Path: /GetAccuracyFromRecordedAudio
                        Method: POST
                # Warm-up event: ping function every 5 minutes to prevent cold starts
                WarmUpEvent:
                    Type: Schedule
                    Properties:
                        Schedule: rate(4 minutes)
                        Input: '{"warmup": true, "language": "en"}'
            Tags:
                Application: PronunciationTrainer
                Component: SpeechEvaluation
        Metadata:
            Dockerfile: Dockerfile
            DockerContext: .
            DockerTag: python3.12-v1

    # CloudWatch Log Group with retention
    SpeechToScoreFunctionLogGroup:
        Type: AWS::Logs::LogGroup
        Properties:
            LogGroupName: !Sub '/aws/lambda/${SpeechToScoreFunction}'
            RetentionInDays: 7

    # CloudWatch Alarms
    SpeechToScoreFunctionErrorAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmDescription: Alert when Lambda function errors exceed threshold
            MetricName: Errors
            Namespace: AWS/Lambda
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 5
            ComparisonOperator: GreaterThanThreshold
            Dimensions:
                - Name: FunctionName
                  Value: !Ref SpeechToScoreFunction

    SpeechToScoreFunctionThrottleAlarm:
        Type: AWS::CloudWatch::Alarm
        Properties:
            AlarmDescription: Alert when Lambda function is throttled
            MetricName: Throttles
            Namespace: AWS/Lambda
            Statistic: Sum
            Period: 300
            EvaluationPeriods: 1
            Threshold: 1
            ComparisonOperator: GreaterThanThreshold
            Dimensions:
                - Name: FunctionName
                  Value: !Ref SpeechToScoreFunction

Outputs:
    ApiUrl:
        Description: API Gateway endpoint URL for production stage
        Value: !Sub 'https://${PronunciationTrainerApi}.execute-api.${AWS::Region}.amazonaws.com/prod/'
        Export:
            Name: !Sub '${AWS::StackName}-ApiUrl'

    SpeechToScoreFunctionArn:
        Description: ARN of the Speech to Score Lambda Function
        Value: !GetAtt SpeechToScoreFunction.Arn
        Export:
            Name: !Sub '${AWS::StackName}-SpeechToScoreFunctionArn'

    ApiId:
        Description: API Gateway ID
        Value: !Ref PronunciationTrainerApi
        Export:
            Name: !Sub '${AWS::StackName}-ApiId'
